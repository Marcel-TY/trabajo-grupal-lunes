{% extends 'base.html' %}
{% block title %}Confirmar Eliminación{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0">⚠️ Confirmar Eliminación</h4>
      </div>
      <div class="card-body text-center">
        <p class="fs-5 mt-2">
          ¿Estás seguro de que deseas eliminar el/la <strong>{{ tipo }}</strong>:
        </p>
        <p class="fs-4 fw-bold text-danger">{{ objeto }}</p>
        <p class="text-muted small">Esta acción no se puede deshacer.</p>

        <form method="post" class="mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">🗑️ Sí, eliminar</button>
          <a href="{{ cancel_url }}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
